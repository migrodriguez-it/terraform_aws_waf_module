# Pipeline de Azure DevOps: despliega el WAF (Terraform) en AWS.
#   - State en Azure Storage (backend azurerm)
#   - Auth a AWS por OIDC (assume-role-with-web-identity), sin llaves de larga vida
# IMPORTANTE: se ejecuta desde la RAÍZ examples/azure-devops, NO desde modules/waf.

trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  # Variable Group con: TF_VAR_prefix, TF_VAR_client_name, TF_VAR_account_id,
  # AWS_ROLE_ARN, AWS_REGION, ARM_SUBSCRIPTION_ID, BACKEND_RG, BACKEND_SA,
  # BACKEND_CONTAINER, CLIENT_NAME.
  - group: waf-terraform
  - name: TF_ROOT
    value: examples/azure-devops
  - name: azureServiceConnection
    value: sc-azure-wif # service connection de Workload Identity Federation

stages:
  - stage: terraform
    jobs:
      - job: plan_apply
        steps:
          # 1) Token OIDC de Azure DevOps (WIF). Sirve para el backend azurerm Y para AWS.
          - task: AzureCLI@2
            displayName: "OIDC token (Azure WIF)"
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              addSpnToEnvironment: true
              inlineScript: |
                echo "##vso[task.setvariable variable=ARM_CLIENT_ID]$servicePrincipalId"
                echo "##vso[task.setvariable variable=ARM_TENANT_ID]$tenantId"
                echo "##vso[task.setvariable variable=ADO_OIDC_TOKEN;issecret=true]$idToken"

          # 2) Assume role en AWS con ese mismo token OIDC → exporta credenciales temporales.
          - script: |
              set -euo pipefail
              CREDS=$(aws sts assume-role-with-web-identity \
                --role-arn "$AWS_ROLE_ARN" \
                --role-session-name "ado-$(Build.BuildId)" \
                --web-identity-token "$(ADO_OIDC_TOKEN)" \
                --duration-seconds 3600 \
                --query 'Credentials' --output json)
              echo "##vso[task.setvariable variable=AWS_ACCESS_KEY_ID;issecret=true]$(echo "$CREDS" | jq -r .AccessKeyId)"
              echo "##vso[task.setvariable variable=AWS_SECRET_ACCESS_KEY;issecret=true]$(echo "$CREDS" | jq -r .SecretAccessKey)"
              echo "##vso[task.setvariable variable=AWS_SESSION_TOKEN;issecret=true]$(echo "$CREDS" | jq -r .SessionToken)"
            displayName: "AWS OIDC AssumeRole"

          # 3) terraform init (backend azurerm) + plan
          - script: |
              set -euo pipefail
              terraform init \
                -backend-config="resource_group_name=$(BACKEND_RG)" \
                -backend-config="storage_account_name=$(BACKEND_SA)" \
                -backend-config="container_name=$(BACKEND_CONTAINER)" \
                -backend-config="key=$(CLIENT_NAME).tfstate"
              terraform plan -input=false -out=tfplan \
                -var-file="clients/$(CLIENT_NAME).tfvars"
            workingDirectory: $(TF_ROOT)
            displayName: "Terraform init + plan"
            env:
              ARM_USE_OIDC: "true"
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
              ARM_TENANT_ID: $(ARM_TENANT_ID)
              ARM_CLIENT_ID: $(ARM_CLIENT_ID)
              ARM_OIDC_TOKEN: $(ADO_OIDC_TOKEN)
              AWS_REGION: $(AWS_REGION)
              AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
              AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
              AWS_SESSION_TOKEN: $(AWS_SESSION_TOKEN)

          # 4) apply (solo en main)
          - script: terraform apply -input=false -auto-approve tfplan
            workingDirectory: $(TF_ROOT)
            displayName: "Terraform apply"
            condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
            env:
              ARM_USE_OIDC: "true"
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
              ARM_TENANT_ID: $(ARM_TENANT_ID)
              ARM_CLIENT_ID: $(ARM_CLIENT_ID)
              ARM_OIDC_TOKEN: $(ADO_OIDC_TOKEN)
              AWS_REGION: $(AWS_REGION)
              AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
              AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
              AWS_SESSION_TOKEN: $(AWS_SESSION_TOKEN)
